name: Test

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Check Python syntax
        run: python -m py_compile scripts/antifragile_scan.py scripts/check_package_contract.py tests/test_antifragile_scan.py tests/test_evaluation_scenarios.py evals/run_evals.py
      - name: Run package contract checks
        run: python scripts/check_package_contract.py
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run executable skill evals
        run: python evals/run_evals.py --review-output templates/review-scorecard.md
