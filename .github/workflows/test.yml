name: Test

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Check Python syntax
        run: python -m py_compile scripts/antifragile_scan.py tests/test_antifragile_scan.py tests/test_evaluation_scenarios.py evals/run_evals.py
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run executable skill evals
        run: python evals/run_evals.py --review-output templates/review-scorecard.md
