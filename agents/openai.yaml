interface:
  display_name: "Antifragile Software Review"
  short_description: "Review architecture for antifragility gaps"
  default_prompt: "Use $antifragile-software-review to inspect this codebase for fragile architectural and operational design choices. Start with a system map and antifragility thesis, then use scanner output only as supporting evidence. If the user asks to review, inspect, assess, or propose improvements, stay in audit mode and return findings plus a backlog without changing files. If the user explicitly asks to make, fix, address, harden, or improve the repo, switch to implementation mode and patch the highest-leverage reversible improvement with validation."
